<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>ari — beta prototype</title>
<style>
:root{
  --bg:#FFFFFF; --surface:#F2F2F2; --ink:#111111; --soft:#8A8A8E; --line:#ECECEC;
  --mark:#325788; --amber:#D9A45A; --r-pill:999px; --r-card:20px; --r-img:6px;
  --shadow-float:0 8px 30px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#ECEAE6; font-family:-apple-system,"SF Pro Text",Inter,"Helvetica Neue",sans-serif;
  display:flex; align-items:center; justify-content:center; min-height:100vh; padding:28px 0; color:var(--ink);
}
button{font-family:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,textarea{font-family:inherit;border:0;outline:none;background:transparent;color:var(--ink)}
::placeholder{color:#B8B8BC}
b,strong{font-weight:600}

/* ============ phone frame ============ */
.phone{
  position:relative; width:390px; height:844px; background:var(--bg); border-radius:48px; overflow:hidden;
  box-shadow:0 0 0 10px #111, 0 0 0 12px #3a3a3a, 0 24px 80px rgba(0,0,0,.25);
  flex:none;
}
.statusbar{
  position:absolute; top:0; left:0; right:0; height:48px; z-index:60; pointer-events:none;
  display:flex; align-items:flex-end; justify-content:space-between; padding:0 30px 4px;
  font-size:15px; font-weight:500;
  background:var(--bg);
}
.statusbar .sicons{display:flex; align-items:center; gap:6px}
.screen.dark ~ .statusbar{color:#fff}
.phone.darkbar .statusbar{color:#fff; background:#0d0d0d}

/* ============ app / screens ============ */
.app{position:absolute; inset:0; overflow:hidden}
.screen{position:absolute; inset:0; background:var(--bg); opacity:0; visibility:hidden; transition:opacity .3s ease, visibility .3s ease}
.screen.active{opacity:1; visibility:visible}
.screen.dark{background:#0d0d0d; color:#fff}
.scrollpage{position:absolute; inset:0; overflow-y:auto; scrollbar-width:none}
.scrollpage::-webkit-scrollbar{display:none}

.icon{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block}
.icon.sm{width:18px;height:18px}
.icon.xs{width:15px;height:15px}

/* top bar (feed) */
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  padding:72px 20px 14px; background:var(--bg);
}
.logo{display:flex;align-items:center}
.bellbtn{position:relative; padding:4px}
.bellbtn .dot{position:absolute; top:2px; right:0; width:4.8px; height:4.8px; border-radius:50%; background:var(--mark)}

/* reflection banner */
.feed-reflection-banner{
  margin:4px 16px 12px; background:#161616; color:#fff; border-radius:14px; padding:8px 10px 8px 8px;
  display:flex; align-items:center; gap:9px; cursor:pointer;
}
.frb-moon{width:30px;height:30px;border-radius:9px;background:#262626;display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.frb-moon svg{width:18px;height:18px;display:block}
.frb-moon svg path{fill:#fff}
.frb-t{font-size:14px;font-weight:500}
.frb-s{font-size:12px;color:#9a9a9a}
.frb-go{margin-left:auto;background:#fff;color:#111;font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--r-pill);flex:none}
.frb-x{color:#8a8a8a;font-size:13px;line-height:1;padding:4px;flex:none}

/* masonry feed — true Pinterest-style, natural aspect ratios */
.masonry{columns:2; column-gap:3px; padding:0 3px 120px}
.tile{break-inside:avoid; margin-bottom:3px; cursor:pointer; display:block}
.tile .ph{position:relative; overflow:hidden; background:var(--surface); border-radius:6px}
.tile .ph img{width:100%; height:auto; display:block}
.tile .ph img{transition:transform .22s cubic-bezier(.3,.7,.4,1)}
.tile .cap{padding:8px 2px 0}
.title-row{display:flex; align-items:center; justify-content:space-between; gap:6px}
.title-row .t{font-size:15px; font-weight:500; letter-spacing:-.2px}
.spark-inline{color:#9a9a9e; flex:none; width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.spark-inline.on{background:var(--amber); color:#fff}
.tile .sub{font-size:13px; color:var(--soft); margin-top:2px}

/* bottom nav */
.bottomnav{
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:40;
  display:flex; align-items:center; gap:10px;
}
.nav-pill{
  background:rgba(255,255,255,.28);
  backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,.45);
  border-radius:var(--r-pill); box-shadow:var(--shadow-float), inset 0 1px 0 rgba(255,255,255,.5);
  display:flex; align-items:center; gap:6px; padding:8px 16px; height:64px;
  isolation:isolate;
}
.navbtn{width:46px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#111;transition:background .18s ease}
.navbtn.on{background:rgba(255,255,255,.32);color:#111}
.nav-av{width:34px;height:34px;border-radius:50%;display:block}
.navbtn.avbtn.on .nav-av{box-shadow:0 0 0 2px #fff,0 0 0 3.5px #111}
.nav-fab{
  width:64px;height:64px;border-radius:50%;
  background:rgba(22,22,22,.4);
  backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;flex:none;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-float), inset 0 1px 0 rgba(255,255,255,.2);
}
.nav-fab .icon{width:28px;height:28px;stroke-width:1.6}

/* ============ plop detail ============ */
.dethead{display:flex;align-items:center;gap:12px;padding:72px 16px 18px;position:relative}
.backbtn{width:44px;height:44px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex:none}
.dethead .ttl{position:absolute;left:0;right:0;text-align:center;font-size:15px;color:var(--soft);pointer-events:none}
.dethead .ttl.b{color:var(--ink);font-weight:500}
.author{display:flex;align-items:center;gap:9px;padding:6px 20px 14px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:15px;flex:none}
.av.sm{width:24px;height:24px;font-size:10px;border:2px solid #fff}
.g0{background:linear-gradient(160deg,#1d3a5f,#6f93b4)} .g1{background:linear-gradient(165deg,#d8c9a8,#a58c66)}
.g2{background:linear-gradient(150deg,#c9a36a,#eadfca)} .g3{background:linear-gradient(160deg,#2b2b2e,#6e6e74)}
.g4{background:linear-gradient(155deg,#5c6b52,#cfd6c0)} .g5{background:linear-gradient(150deg,#a3543d,#e8c3b2)}
.g6{background:linear-gradient(160deg,#10182b,#3c4f7a)} .g7{background:linear-gradient(160deg,#efece6,#cfc8ba)}
.g8{background:linear-gradient(160deg,#7fa8a0,#dcebe6)} .g9{background:linear-gradient(160deg,#5a5a86,#cdaec6)}
.author .nm{font-size:15px;font-weight:600}
.author .hd{font-size:13px;color:var(--soft)}
.author .when{margin-left:auto;font-size:12px;color:var(--soft)}
.hero{position:relative;margin:4px 0 14px;background:var(--surface);border-radius:0}
.hero > img{border-radius:0;display:block;width:100%}
.hero img{width:100%;height:416px;object-fit:cover;display:block}
.marks-pill{
  position:absolute;top:12px;right:12px;background:rgba(70,70,72,.78);color:#fff;font-size:13px;font-weight:500;
  padding:8px 14px;border-radius:var(--r-pill);display:flex;align-items:center;gap:7px;backdrop-filter:blur(4px);
}
.marks-pill .rdot{width:12px;height:12px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center}
.marks-pill .rdot::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--mark)}
.mark-dot{
  position:absolute;width:27px;height:27px;border-radius:50%;background:var(--mark);border:1.5px solid #fff;
  color:#fff;font-size:13px;font-weight:500;line-height:1;display:none;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.hero.marks-on .mark-dot{display:flex}
.plop-mark{
  position:absolute;width:27px;height:27px;border-radius:50%;background:var(--mark);border:1.5px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;display:none;
  transition:width .24s cubic-bezier(.32,.8,.4,1), height .24s cubic-bezier(.32,.8,.4,1), border-radius .24s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
  z-index:5;
}
.hero.marks-on .plop-mark{display:block}
.plop-mark.rect{width:50px;height:50px;background:rgba(50,87,136,.12);border:1.5px dashed var(--mark);box-shadow:none;border-radius:8px}
.plop-mark .pm-badge{position:absolute;inset:0;border-radius:inherit;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:500;line-height:1;background:var(--mark)}
.plop-mark.rect .pm-badge{inset:auto;top:4px;left:4px;width:18px;height:18px;border-radius:50%;font-size:10px;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.plop-mark .pm-note,.plop-mark .pm-del{display:none}
.plop-mark.lasso{background:none;border:none;box-shadow:none;border-radius:0}
.plop-mark.lasso .lasso-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
.plop-mark.lasso .lasso-path{fill:rgba(50,87,136,.14);stroke:var(--mark);stroke-width:2;stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke}
.plop-mark.lasso .pm-badge{inset:auto;top:4px;left:4px;width:18px;height:18px;border-radius:50%;font-size:10px;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.plop-mark.lasso.open .lasso-svg{display:none}
.plop-mark.open{width:190px;max-width:calc(100% - 24px);height:auto;min-height:56px;border-radius:16px;box-shadow:0 10px 34px rgba(0,0,0,.24);z-index:6;background:#fff;border-color:transparent}
.plop-mark.open .pm-badge{inset:auto;top:10px;left:10px;width:22px;height:22px;border-radius:50%;font-size:12px}
.plop-mark.open .pm-note{display:block;padding:14px 34px 14px 40px;color:#111;font-size:13px;line-height:1.45;word-break:break-word}
.plop-mark.open .pm-del{display:flex;position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;color:#8a8a8e;background:var(--surface)}
.plop-mark.open .pm-del svg{width:12px;height:12px}
.actions{display:flex;align-items:center;gap:6px;padding:6px 18px 14px}
.actbtn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink);position:relative;flex-grow:0;flex-basis:44px}
.actbtn.note-toggle{cursor:pointer;transition:flex-grow .22s ease, border-radius .22s ease, background .2s ease}
.actbtn.note-toggle .nt-tools{display:none}
.actbtn.note-toggle.open{flex-grow:1;border-radius:22px;background:#161616;color:#fff;justify-content:flex-start;padding:0 10px}
.actbtn.note-toggle.open .nt-collapsed{display:none}
.actbtn.note-toggle.open .nt-tools{display:flex;align-items:center;gap:8px;width:100%}
.actbtn.note-toggle .nt-tools svg{width:18px;height:18px}
.actbtn.note-toggle .nt-tools button{color:#fff;display:flex;padding:4px;border-radius:50%;flex:none}
.actbtn.note-toggle .nt-tools .push-right{margin-left:auto}
.actbtn.note-toggle .nt-tools button.on{background:#fff;color:#161616}
.actbtn.note-toggle .nt-tools button.dim{color:#8a8a8e}
.actbtn.note-toggle .nt-tools .tsep{width:1px;height:20px;background:#3c3c3c;flex:none}
.inline-notewrap{max-height:0;opacity:0;overflow:hidden;margin:0 20px 0;transition:max-height .28s ease, opacity .2s ease, margin .28s ease}
.inline-notewrap.open{max-height:640px;opacity:1;margin:0 20px 14px}
.plop-saverow{display:flex;align-items:center;gap:8px;margin-top:12px}
.plop-savepond{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:6px;background:#fff;border:1.5px solid #EDEDED;color:var(--ink);font-size:14px;font-weight:500;padding:11px 16px;border-radius:14px}
.plop-savepond span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plop-savepond .car{color:var(--soft);font-size:15px;flex:none}
.plop-savebtn{flex:none;background:#161616;color:#fff;font-size:14px;font-weight:600;padding:12px 22px;border-radius:14px}
.hero.armed{cursor:crosshair}
.hero.armed img{cursor:crosshair}
.actbtn.spark.on{background:var(--amber);color:#fff;box-shadow:0 0 0 6px rgba(217,164,90,.25)}
.actbtn.keep.on{background:#161616;color:#fff;box-shadow:0 0 0 6px rgba(0,0,0,.06)}
.actbtn.note-toggle.on{background:#161616;color:#fff;box-shadow:0 0 0 6px rgba(0,0,0,.06)}
.plop-title{padding:0 20px;font-size:18px;font-weight:600;letter-spacing:-.2px;line-height:1.35}
.plop-sub{padding:4px 20px 10px;font-size:13px;color:var(--soft);line-height:1.4}
.plop-place{padding:0 20px 14px}
.place-tag{display:inline-flex;align-items:center;gap:5px;background:var(--surface);color:var(--ink);font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--r-pill)}
.place-tag .icon{width:14px;height:14px}
.plop-desc{padding:0 20px 18px;font-size:15px;line-height:1.6}
.keptby{
  margin:0 16px 20px;background:var(--surface);border-radius:14px;padding:13px 16px;
  display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--ink);
}
.avstack{display:flex;flex:none}
.avstack .av.sm+.av.sm{margin-left:-8px}
.keptby .chev{margin-left:auto;color:#9a9a9e}
.notesbox{margin:0 16px 28px;border:1.5px dashed #DDDDDD;border-radius:16px;padding:18px}
.notesbox .nb-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:1px;color:#6f6f73}
.notesbox .nb-h .only{font-weight:400;letter-spacing:0;color:var(--soft);text-transform:none;font-size:13px}
.note-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #F0F0F0;font-size:14px;line-height:1.5}
.note-item:last-child{border-bottom:0;padding-bottom:2px}
.note-item .num{width:26px;height:26px;border-radius:50%;background:var(--mark);color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
.note-item.ro .num{background:none;border:1.5px solid var(--mark);position:relative}
.note-item.ro .num::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--mark)}
.disc{border-top:8px solid #FAFAFA;padding:22px 0 120px}
.disc h2{font-size:18px;font-weight:600;letter-spacing:-.3px;padding:0 20px 14px}
.chips{display:flex;gap:8px;padding:0 4px 16px}
.chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:#6f6f73;background:var(--surface);padding:8px 14px;border-radius:var(--r-pill)}
.chip.on{background:#161616;color:#fff}
.rc-grid{columns:2;column-gap:3px;padding:0 3px}
.rc{break-inside:avoid;margin-bottom:3px;cursor:pointer;display:block}
.rc-img{position:relative;width:100%;overflow:hidden;background:var(--surface);border-radius:6px}
.rc-img img{width:100%;height:auto;display:block}

/* ============ alerts ============ */
.sect-label{font-size:12px;font-weight:500;letter-spacing:1px;color:var(--soft);padding:18px 20px 10px}
.draft-card{margin:0 16px 14px;border:1px solid #EFEFEF;border-radius:16px;padding:14px;display:flex;gap:14px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
.draft-card .thumb{width:74px;height:74px;border-radius:10px;object-fit:cover;flex:none;position:relative}
.draft-card .thumbwrap{position:relative;flex:none}
.draft-card .thumbwrap::after{content:'';position:absolute;top:6px;right:6px;width:10px;height:10px;border-radius:50%;background:var(--amber);border:2px solid #fff}
.draft-card .dt{font-size:15px;font-weight:500}
.draft-card .dm{font-size:13px;color:var(--soft);margin-top:2px}
.draft-card .dq{font-size:14px;font-style:italic;margin-top:2px;line-height:1.45}
.draft-card .cont{margin-top:10px;background:#161616;color:#fff;font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:6px}
.show-more{padding:2px 20px 8px;font-size:14px;color:var(--soft);cursor:pointer}
.act-card{margin:0 16px 12px;border:1px solid #EFEFEF;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px}
.act-card.unread{background:#F5F8FC;border-color:#E4ECF6}
.act-card .udot{width:8px;height:8px;border-radius:50%;background:transparent;flex:none}
.act-card.unread .udot{background:#FF3B30}
.act-card .tx{font-size:14px;line-height:1.4}
.act-card .tm{font-size:12px;color:var(--soft);margin-top:3px}
.act-card .athumb{width:48px;height:62px;border-radius:8px;margin-left:auto;flex:none}
.markread{margin-left:auto;font-size:13px;font-weight:500;color:var(--mark);position:relative;z-index:1}

/* ============ profile ============ */
.prof-top{display:flex;align-items:flex-start;padding:72px 20px 0}
.prof-icons{display:flex;gap:10px;margin-left:auto}
.prof-icons .pib{width:44px;height:44px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center}
.prof-id-row{display:flex;align-items:center;gap:14px;padding:22px 20px 0}
.prof-av{width:48px;height:48px;border-radius:50%;font-size:18px}
.prof-body{padding:12px 20px 0}
.prof-name{font-size:22px;font-weight:600;letter-spacing:-.3px;line-height:1.25}
.prof-handle{font-size:14px;color:var(--soft);margin-top:2px;line-height:1.4}
.prof-bio{font-size:15px;margin-top:10px;line-height:1.45}
.prof-btns{display:flex;gap:10px;margin-top:16px}
.pbtn{border:1.5px solid #E2E2E2;border-radius:var(--r-pill);font-size:15px;font-weight:500;padding:10px 20px}
.pbtn.dark{background:#161616;border-color:#161616;color:#fff}
.prof-tabs{display:flex;align-items:center;padding:20px 20px 12px;position:sticky;top:0;background:#fff;z-index:5}
.pt-all{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;cursor:pointer}
.pt-all .cnt{background:#161616;color:#fff;font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--r-pill)}
.pt-all .car{color:var(--soft);font-size:12px}
/* pond label + sub-tab chip row */
.pond-label{font-size:16px;font-weight:600;letter-spacing:-.2px;cursor:pointer;display:flex;align-items:center;gap:6px}
.pond-label .car{color:var(--soft);font-size:12px}
.subtab-row{display:flex;gap:6px;padding:2px 20px 12px;overflow-x:auto;scrollbar-width:none;background:#fff;position:sticky;top:66px;z-index:4}
.subtab-row::-webkit-scrollbar{display:none}
.subtab-chip{padding:7px 13px;background:#f3f3f2;border-radius:var(--r-pill);font-size:13px;font-weight:500;color:#4a4a4a;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;user-select:none;position:relative}
.subtab-chip.on{background:#161616;color:#fff;font-weight:600}
.subtab-chip .cnt{font-size:11px;color:#999;font-weight:400}
.subtab-chip.on .cnt{color:rgba(255,255,255,.7)}
.subtab-chip.manual{background:#fff;border:1px solid #E2E2E2}
.subtab-chip.manual.on{background:#161616;border-color:#161616;color:#fff}
.subtab-chip.drop{outline:2px dashed var(--soft);outline-offset:2px}
.subtab-chip[draggable="true"]{cursor:grab}
.subtab-chip[draggable="true"]:active{cursor:grabbing}
.subtab-add{padding:7px 12px;color:#999;font-size:14px;background:transparent;border:1px dashed #d5d5d5;border-radius:var(--r-pill);flex-shrink:0;cursor:pointer}
.viewseg{margin-left:auto;background:#EFEFEF;border-radius:var(--r-pill);padding:4px;display:flex;gap:2px}
.viewseg button{width:38px;height:34px;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:center;color:#7c7c80}
.viewseg button.on{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding-bottom:120px}
.pcell{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer}
.pcell img{width:100%;height:100%;object-fit:cover;display:block}
.pcell .spark-badge{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--amber);border:2.5px solid rgba(255,255,255,.9)}

.search-head .icon{width:20px;height:20px}
.mycol-row{padding:14px 20px 2px}
.col-toggle{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:500;color:var(--ink)}
.col-toggle .cbox{width:20px;height:20px;border-radius:6px;border:1.5px solid #D5D5D8;display:flex;align-items:center;justify-content:center;color:transparent;transition:.15s;flex:none}
.col-toggle .cbox svg{width:13px;height:13px;display:block}
.col-toggle.on .cbox{background:var(--mark);border-color:var(--mark);color:#fff}
.seg-toggle{display:inline-flex;background:#f3f3f2;border-radius:var(--r-pill);padding:3px}
.seg-btn{padding:6px 14px;font-size:13px;font-weight:500;color:#6b6b6b;background:transparent;border:0;border-radius:var(--r-pill);cursor:pointer}
.seg-btn.on{background:#fff;color:#161616;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.fs-sticky{position:sticky;top:0;z-index:5;background:#fff}
.fs-cancel{background:transparent;border:0;color:var(--ink);font-size:15px;font-weight:500;padding:0 4px 0 10px;cursor:pointer}
.fs-count-inline{margin-left:10px;font-size:13px;color:var(--soft);align-self:center}
.mycol-row{padding:14px 20px 8px;display:flex;align-items:center}
.browse-pills{display:flex;gap:8px;padding:4px 20px 12px;overflow-x:auto;scrollbar-width:none}
.browse-pills::-webkit-scrollbar{display:none}
.bpill{padding:7px 14px;background:#f3f3f2;border-radius:var(--r-pill);font-size:13px;font-weight:500;color:#4a4a4a;white-space:nowrap;flex-shrink:0;cursor:pointer;user-select:none}
.bpill.on{background:#161616;color:#fff;font-weight:600}
.preview-mosaic{columns:2;column-gap:3px;padding:8px 3px 0}
.preview-mosaic .pm-cell{break-inside:avoid;margin-bottom:3px;overflow:hidden;cursor:pointer;display:block;border-radius:6px}
.preview-mosaic .pm-cell img{width:100%;height:auto;display:block}
.rec-head{display:flex;justify-content:space-between;align-items:center;padding:16px 0 8px;font-size:13px;color:var(--soft);font-weight:500}
.rec-clear{color:var(--soft);font-weight:500;cursor:pointer}
.rec-item{display:flex;align-items:center;gap:12px;padding:12px 0;font-size:15px;color:var(--ink);cursor:pointer;border-bottom:1px solid #f2f2f2}
.rec-item .ric{width:18px;height:18px;color:var(--soft);flex-shrink:0}
.rec-item .rx{margin-left:auto;color:var(--soft);font-size:16px;padding:4px 8px}
.sug-item{display:flex;align-items:center;gap:12px;padding:11px 0;font-size:15px;color:var(--ink);cursor:pointer}
.sug-item .ric{width:18px;height:18px;color:var(--soft);flex-shrink:0}
.sh-sub{font-size:14px;color:var(--soft);margin:20px 0 12px}
.settings-group{background:var(--surface);border-radius:var(--r-card);padding:2px 14px}
.settings-group .srow{border-bottom:1px solid rgba(0,0,0,.07)}
.settings-group .srow:last-child{border-bottom:0}
.wordchips{display:flex;flex-wrap:wrap;gap:10px}
.wchip{display:flex;align-items:center;gap:7px;background:var(--surface);border-radius:var(--r-pill);padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer}
.wchip .c{color:var(--soft);font-weight:400;font-size:12px}
.results-grid{columns:2;column-gap:3px;margin-top:14px;padding:0 3px}
.res-cell{break-inside:avoid;margin-bottom:3px;display:block;cursor:pointer;position:relative;overflow:hidden;border-radius:6px}
.res-cell img{width:100%;height:auto;display:block}
.res-cell .rl{position:absolute;left:0;right:0;bottom:0;padding:20px 10px 8px;color:#fff;font-size:12px;font-weight:500;background:linear-gradient(transparent,rgba(0,0,0,.55));line-height:1.2}

/* toast */
.toast{
  position:absolute;left:50%;bottom:180px;transform:translateX(-50%) translateY(6px);z-index:90;
  background:#161616;color:#fff;font-size:13px;font-weight:400;padding:10px 20px;border-radius:var(--r-pill);
  opacity:0;pointer-events:none;transition:.18s;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%)}
.toast .ta-action{margin-left:10px;text-decoration:underline;font-weight:400;cursor:pointer;pointer-events:auto}

/* Apple-style camera */
.cam-top{position:absolute;top:56px;left:0;right:0;display:flex;justify-content:space-between;padding:0 22px;z-index:5}
.cam-top-btn{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.35);color:#fff;display:flex;align-items:center;justify-content:center;border:0}
.cam-top-btn svg{width:16px;height:16px}
.cam-top-chev{background:rgba(0,0,0,.35);font-size:20px;line-height:1;padding-bottom:2px}
.cam-preview{position:absolute;top:100px;left:0;right:0;bottom:200px;overflow:hidden}
.cam-preview-img{width:100%;height:100%;object-fit:cover;opacity:.9;filter:brightness(.8) contrast(1.05)}
.cam-zoom{position:absolute;bottom:172px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:4}
.cam-zoom-btn{padding:5px 9px;font-size:11px;font-weight:600;background:rgba(0,0,0,.5);color:#fff;border-radius:50%;min-width:26px;border:0}
.cam-zoom-btn.on{background:rgba(255,204,0,.15);color:#FCC419;padding:6px 11px}
.cam-modes{position:absolute;bottom:130px;left:0;right:0;display:flex;justify-content:center;gap:22px;font-size:11px;font-weight:600;letter-spacing:1.2px;color:#a3a3a3;z-index:4}
.cam-modes .on{color:#FCC419}
.cam-controls{position:absolute;bottom:36px;left:0;right:0;display:flex;align-items:center;justify-content:space-around;padding:0 34px;z-index:5}
.cam-thumb{width:44px;height:44px;border-radius:8px;overflow:hidden;background:#333;border:1px solid rgba(255,255,255,.2)}
.cam-thumb img{width:100%;height:100%;object-fit:cover}
.shutter{width:72px;height:72px;border-radius:50%;background:#fff;border:4px solid #fff;box-shadow:0 0 0 3px rgba(0,0,0,.35), inset 0 0 0 2px transparent}
.cam-flip{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;border:0}
.cam-flip svg{width:20px;height:20px}

</style>

const plopScreen=(id,o)=>`
<section id="${id}" class="screen">
  <div class="scrollpage">
    <div class="dethead"><button class="backbtn" onclick="goBack('${o.back}')">${I.arrowL}</button></div>
    <div class="author" style="cursor:pointer" onclick="go('${id==='scr-plop-mine'?'scr-my-profile':'scr-other-profile'}')">${av(o.avL,o.avG)}<span class="nm">${o.name}</span><span class="hd">@${o.handle}</span><span class="when">${o.when}</span></div>
    <div class="hero marks-on" id="${id}-hero" onpointerdown="plopPointerDown('${id}',event)" onpointermove="plopPointerMove('${id}',event)" onpointerup="plopPointerUp('${id}',event)" onpointerleave="plopPointerUp('${id}',event)">
      <img src="${IMG[o.img]}" alt="">
      ${id==='scr-plop-mine'?`<button class="marks-pill" onclick="toggleMarks('${id}')"><span class="rdot"></span><span id="${id}-mtext">Hide marks</span></button>
      ${o.marks.map((m,i)=>{
        const pos = m.x>55
          ? `top:calc(${m.y}% - 13.5px); right:calc(${100-m.x}% - 13.5px); left:auto;`
          : `top:calc(${m.y}% - 13.5px); left:calc(${m.x}% - 13.5px); right:auto;`;
        return `<div class="plop-mark" style="${pos}" onclick="event.stopPropagation();toggleMarkNote('${id}',this)"><span class="pm-badge">${m.n}</span><span class="pm-note">${m.note}</span><button class="pm-del" onclick="event.stopPropagation();deletePlopMark(this.parentElement)">${I.close}</button></div>`;
      }).join('')}`:''}
    </div>
    <div class="actions">
      <button class="actbtn keep" onclick="actKeep(this)">${I.bookmark}</button>
      <div class="actbtn note-toggle" id="${id}-notebtn" onclick="toggleInlineNote('${id}')">
        <span class="nt-collapsed">${I.scribble}</span>
        <div class="nt-tools">
          <button id="${id}-tool-mark" onclick="event.stopPropagation();plopPickTool('${id}','mark')">${I.dot}</button>
          <button id="${id}-tool-scribble" onclick="event.stopPropagation();plopPickTool('${id}','scribble')">${I.scribble}</button>
          <button class="dim push-right" onclick="event.stopPropagation();plopUndo('${id}')">${I.undo}</button>
          <button class="dim" onclick="event.stopPropagation();plopClearMarks('${id}')">${I.trash}</button>
          <button class="nt-close" onclick="event.stopPropagation();toggleInlineNote('${id}')">${I.close}</button>
        </div>
      </div>
      <button class="actbtn" onclick="toast('Share link copied')">${I.share}</button>
    </div>
    <div class="inline-notewrap" id="${id}-notewrap">
      <div class="ed-hint" id="${id}-hint">Tap a tool, then tap the image where you want to mark</div>
      <div class="ed-noterow">
        <input id="${id}-note-in" placeholder="Note without marking...">
        <button onclick="openSheet('voice-sheet')">${I.micS}</button>
        <button class="addbtn" onclick="addInlineNote('${id}')">${I.plus}</button>
      </div>
      <div id="${id}-plopnotes"></div>
      <div class="plop-saverow">
        <button class="plop-savepond" onclick="event.stopPropagation();openPlopPond('${id}')"><span id="${id}-savepond-name">Inspiration</span><span class="car">▾</span></button>
        <button class="plop-savebtn" onclick="event.stopPropagation();plopSaveNote('${id}')">${id==='scr-plop-mine'?'Saved':'Save'}</button>
      </div>
    </div>
    <div class="plop-title">${o.title}</div>
    <div class="plop-sub">${o.sub}</div>
    ${o.place?`<div class="plop-place"><span class="place-tag">${I.pin}${o.place}</span></div>`:''}
    <div class="plop-desc">${o.desc}</div>
    <div class="keptby" onclick="openSheet('keptby-sheet')">
      <span class="avstack">${av('','g5',1)}${av('','g8',1)}${av('','g9',1)}</span>
      <span>Kept by ${o.keptNames} and ${o.keptMore} more</span><span class="chev">›</span>
    </div>
    <div class="notesbox" id="${id}-notesbox" style="display:none">
      <div class="nb-h">${I.lock} YOUR NOTES <span class="only">· only you</span></div>
    </div>
    <div class="disc">
      <h2>Discoveries from this plop</h2>
      <div class="rc-grid" id="${id}-rc"></div>
    </div>
  </div>
</section>`;

function tilePressStart(i){

function tilePressEnd(i){

function tilePressCancel(){

function openTile(i){
  const f=FEED[i];
  const tile=document.getElementById('tile-'+i);
  const img=tile.querySelector('img');
  img.style.transform='scale(1.06)';
  const targetId = f.mine ? 'scr-plop-mine' : 'scr-plop-others';

function populatePlop(id, f){
  const section = document.getElementById(id);
  const hero = document.getElementById(id+'-hero');
  // Hero image
  if(hero){
    const heroImg = hero.querySelector('img');
    if(heroImg) heroImg.src = IMG[f.img] || heroImg.src;
    // Clear previous marks + pill
    hero.querySelectorAll('.plop-mark').forEach(el=>el.remove());
    const oldPill = hero.querySelector('.marks-pill');
    if(oldPill) oldPill.remove();
  }
  // Title, sub, description
  if(section){
    const t = section.querySelector('.plop-title'); if(t) t.textContent = f.t || '';
    const s = section.querySelector('.plop-sub'); if(s) s.textContent = f.s || '';
    const d = section.querySelector('.plop-desc');
    if(d) d.textContent = f.desc || f.s || '';
  }
  // Notes from MARKNOTES
  const notes = (typeof MARKNOTES !== 'undefined' && MARKNOTES[f.img]) || [];
  const hasNotes = notes.length > 0;
  const marked = notes.filter(n => n.marked);
  // Render mark dots on hero (only for marked notes)
  if(hero && marked.length){
    const positions = markPositionsFor(f.img, marked.length);
    marked.forEach((note, i) => {
      const p = positions[i];
      const pos = p.x > 55
        ? `top:calc(${p.y}% - 13.5px); right:calc(${100-p.x}% - 13.5px); left:auto;`
        : `top:calc(${p.y}% - 13.5px); left:calc(${p.x}% - 13.5px); right:auto;`;
      const el = document.createElement('div');
      el.className = 'plop-mark';
      el.setAttribute('style', pos);
      el.setAttribute('onclick', `event.stopPropagation();toggleMarkNote('${id}',this)`);
      el.innerHTML = `<span class="pm-badge">${i+1}</span><span class="pm-note">${note.text.replace(/"/g,'&quot;')}</span>`;
      hero.appendChild(el);
    });
    // Add marks-pill (Show/Hide marks) — only count marked
    hero.classList.remove('marks-on');
    const pill = document.createElement('button');
    pill.className = 'marks-pill';
    pill.setAttribute('onclick', `toggleMarks('${id}')`);
    pill.innerHTML = `<span class="rdot"></span><span id="${id}-mtext">Show ${marked.length} mark${marked.length>1?'s':''}</span>`;
    hero.appendChild(pill);
  }
  // Notes list (universal — includes both marked and free)
  const notesbox = document.getElementById(id+'-notesbox');
  if(notesbox){
    if(hasNotes){
      notesbox.style.display='';
      // Render marked first with numbers, then free with dots
      let markedIdx = 0;
      const rows = notes.map(n => {
        if(n.marked){
          markedIdx++;
          return `<div class="note-item"><span class="num">${markedIdx}</span><span>${n.text}</span></div>`;
        } else {
          return `<div class="note-item ro"><span class="num"></span><span>${n.text}</span></div>`;
        }
      }).join('');
      notesbox.innerHTML = `<div class="nb-h">${I.lock} YOUR NOTES <span class="only">· only you</span></div>` + rows;
    } else {
      notesbox.style.display='none';
      notesbox.innerHTML = '';
    }
  }
  // Reset plopnotes area (for new notes)
  const plopnotes = document.getElementById(id+'-plopnotes');
  if(plopnotes) plopnotes.innerHTML='';
  // Sync SAVED state — if you marked it, you saved it
  plopSaved[id] = hasNotes || !!f.kept || !!f.mine;
  setSaveBtnLabel(id);
  const bookmarkBtn = section && section.querySelector('.actbtn.keep');
  if(bookmarkBtn) bookmarkBtn.classList.toggle('on', plopSaved[id]);
  const noteToggle = document.getElementById(id+'-notebtn');
  if(noteToggle) noteToggle.classList.toggle('on', hasNotes);
}
// Deterministic mark positions per image (spread across image)
function markPositionsFor(imgKey, count){
  const seeds = [
    [52, 45], [32, 58], [68, 55], [45, 76], [60, 32], [28, 38],
    [72, 78], [50, 62], [38, 26], [66, 68]
  ];
  const off = (imgKey.charCodeAt(0) + imgKey.length) % seeds.length;
  return Array.from({length: count}, (_, i) => {
    const s = seeds[(off + i) % seeds.length];
    return {x: s[0], y: s[1]};
  });
}

function currentGridItems(){
  let pond = 'All', active = null;
  try { pond = PROFILE_STATE.pond; active = PROFILE_STATE.activeSubs; } catch(e){}
  let items = MYGRID;
  if(pond !== 'All'){
    const members = POND_MEMBERS[pond] || [];
    items = MYGRID.filter(c => members.includes(c.img));
  }
  // Sub-tab filter (multi-select: union — image matches ANY selected chip)
  if(active && active.size){
    items = items.filter(c => {
      // All view uses IMAGE_CATEGORIES (broad); other ponds use per-image tags in FEED
      if(pond === 'All'){
        const cats = (typeof IMAGE_CATEGORIES !== 'undefined' && IMAGE_CATEGORIES[c.img]) || [];
        return [...active].some(t => cats.includes(t));
      }
      const f = FEED_BY_ID[c.img];
      if(!f || !f.tags) return false;
      return [...active].some(t => f.tags.includes(t.toLowerCase()));
    });
  }
  return items;
}
function renderMyGrid(){
  const items = currentGridItems();
  const grid = document.getElementById('mygrid');

  if(!grid) return;

    grid.innerHTML = `<div style="grid-column:1/-1;padding:32px 20px;text-align:center;color:var(--soft);font-size:14px">No plops match this filter.</div>`;
    list.innerHTML = '';
    return;

  grid.innerHTML = items.map(c=>{
    const feedIdx = FEED.findIndex(fe => fe.img === c.img);
    const onClick = feedIdx >= 0 ? `openTile(${feedIdx})` : `go('scr-plop-mine')`;
    return `<div class="pcell" onclick="${onClick}"><img src="${IMG[c.img]}"></div>`;
  }).join('');
  // List view: only items that have marks/notes
  const noted = items.filter(c => (MARKNOTES[c.img] && MARKNOTES[c.img].length));
  if(!noted.length){
    list.innerHTML = `<div class="plist-empty">No notes yet. Long-press a plop and add a mark to start.</div>`;
  } else {
    list.innerHTML = noted.map(c=>{
      const notes = MARKNOTES[c.img] || [];
      const f = FEED_BY_ID[c.img] || {};
      // Render marked (numbered) then free (dot); preserve original order
      let mIdx = 0;
      const rows = notes.map(n => {
        if(n.marked){
          mIdx++;
          return `<div class="pnote-item"><span class="pn-num">${mIdx}</span><span class="pn-txt">${n.text}</span></div>`;
        } else {
          return `<div class="pnote-item"><span class="pn-num dot"></span><span class="pn-txt">${n.text}</span></div>`;
        }
      }).join('');
      // Find FEED index to open its detail page
      const feedIdx = FEED.findIndex(fe => fe.img === c.img);
      const onClick = feedIdx >= 0 ? `openTile(${feedIdx})` : `go('scr-plop-mine')`;
      return `<div class="pnote-row" onclick="${onClick}"><img src="${IMG[c.img]}">
        <div class="pnote-notes">
          <div class="pnote-head"><div class="pnote-title">${f.t || ''}</div><div class="pnote-sub">${f.s || ''}</div></div>
          ${rows}
        </div>
      </div>`;
    }).join('');
  }
}

let plopDrag=null;   // freehand lasso in progress
const SVGNS='http://www.w3.org/2000/svg';
function plopPointerDown(id,evt){
  const tool=plopTool[id];
  if(!tool) return;
  const hero=document.getElementById(id+'-hero');
  const img=hero.querySelector('img');
  const rect=img.getBoundingClientRect();
  if(evt.clientX<rect.left||evt.clientX>rect.right||evt.clientY<rect.top||evt.clientY>rect.bottom) return;
  const sx=((evt.clientX-rect.left)/rect.width)*100;
  const sy=((evt.clientY-rect.top)/rect.height)*100;
  if(tool==='mark'){
    const el=document.createElement('div');
    el.className='plop-mark';
    el.style.left='calc('+sx+'% - 13.5px)';
    el.style.top='calc('+sy+'% - 13.5px)';
    hero.appendChild(el);
    plopMarkCount[id]=(plopMarkCount[id]||0)+1;
    pendingPlopMark={id,n:plopMarkCount[id],el};
    document.getElementById('mn-num').textContent=plopMarkCount[id];
    document.getElementById('mn-in').value='';
    openSheet('mark-note-popup');
    return;
  }
  // scribble tool → freehand lasso: full-image overlay while drawing
  const el=document.createElement('div');
  el.className='plop-mark lasso drawing';
  el.style.left='0%'; el.style.top='0%'; el.style.width='100%'; el.style.height='100%';
  const svg=document.createElementNS(SVGNS,'svg');
  svg.setAttribute('class','lasso-svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');
  const path=document.createElementNS(SVGNS,'path');
  path.setAttribute('class','lasso-path');
  svg.appendChild(path);
  el.appendChild(svg);
  hero.appendChild(el);
  plopDrag={id,rect,el,svg,path,pts:[[sx,sy]]};
  updateLassoPath(plopDrag,false);
  try{ hero.setPointerCapture(evt.pointerId); plopDrag.pointerId=evt.pointerId; }catch(e){}
  evt.preventDefault();
}
function updateLassoPath(d,close){
  const pts=d.pts;
  if(!pts.length){ d.path.setAttribute('d',''); return; }
  let s='M'+pts.map(p=>p[0].toFixed(2)+' '+p[1].toFixed(2)).join('L');
  if(close) s+='Z';
  d.path.setAttribute('d',s);
}
function plopPointerMove(id,evt){
  if(!plopDrag || plopDrag.id!==id) return;
  const {rect,pts}=plopDrag;
  const cx=Math.min(Math.max(((evt.clientX-rect.left)/rect.width)*100,0),100);
  const cy=Math.min(Math.max(((evt.clientY-rect.top)/rect.height)*100,0),100);
  const last=pts[pts.length-1];
  if(!last || Math.abs(last[0]-cx)+Math.abs(last[1]-cy) > 0.4){ pts.push([cx,cy]); updateLassoPath(plopDrag,false); }
}
function plopPointerUp(id,evt){
  if(!plopDrag || plopDrag.id!==id) return;
  const d=plopDrag;
  plopDrag=null;
  try{ if(d.pointerId!=null) document.getElementById(id+'-hero').releasePointerCapture(d.pointerId); }catch(e){}
  const {el,svg,pts}=d;
  el.classList.remove('drawing');
  if(pts.length<3){ el.remove(); return; }
  let minX=100,minY=100,maxX=0,maxY=0;
  pts.forEach(p=>{minX=Math.min(minX,p[0]);minY=Math.min(minY,p[1]);maxX=Math.max(maxX,p[0]);maxY=Math.max(maxY,p[1]);});
  const w=maxX-minX, h=maxY-minY;
  if(w<3 && h<3){ el.remove(); return; }
  updateLassoPath(d,true);
  svg.setAttribute('viewBox',minX+' '+minY+' '+w+' '+h);
  el.style.left=minX+'%'; el.style.top=minY+'%'; el.style.width=w+'%'; el.style.height=h+'%';
  plopMarkCount[id]=(plopMarkCount[id]||0)+1;
  pendingPlopMark={id,n:plopMarkCount[id],el};
  document.getElementById('mn-num').textContent=plopMarkCount[id];
  document.getElementById('mn-in').value='';
  openSheet('mark-note-popup');
}

    path.setAttribute('stroke-linejoin','round');
    path.setAttribute('vector-effect','non-scaling-stroke');
    path.setAttribute('style','filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));stroke:#fff;stroke-width:3');
    svg.appendChild(path);
    wrap.appendChild(svg);
    marks.appendChild(wrap);
    edDrag = { rect, pts: [[x,y]], svg, path, wrap, pointerId: evt.pointerId };
    try { document.getElementById('ed-photo').setPointerCapture(evt.pointerId); } catch(e){}
    updateEdFreehandPath();
    document.getElementById('ed-hint').style.display='none';
  }
}
function edPointerMove(evt){
  if(!edDrag) return;
  const {rect, pts} = edDrag;
  const cx = Math.min(Math.max(((evt.clientX-rect.left)/rect.width)*100, 0), 100);
  const cy = Math.min(Math.max(((evt.clientY-rect.top)/rect.height)*100, 0), 100);
  const last = pts[pts.length-1];
  if(!last || Math.abs(last[0]-cx)+Math.abs(last[1]-cy) > 0.3){
    pts.push([cx,cy]);
    updateEdFreehandPath();
  }
}
function edPointerUp(evt){
  if(!edDrag) return;
  const d = edDrag; edDrag = null;
  try { document.getElementById('ed-photo').releasePointerCapture(d.pointerId); } catch(e){}
  d.wrap.classList.remove('drawing');
  if(d.pts.length < 3){ d.wrap.remove(); return; }
  edMarkCount++;
  // Attach a number badge at the last point
  const last = d.pts[d.pts.length-1];
  d.wrap.insertAdjacentHTML('beforeend',
    `<span class="mark-arrow-num" style="position:absolute;left:calc(${last[0]}% - 9px);top:calc(${last[1]}% - 9px)">${edMarkCount}</span>`);
  document.getElementById('mn-num').textContent = edMarkCount;
  document.getElementById('mn-in').value = '';
  openSheet('mark-note-popup');
  if(typeof updateSaveLabel === 'function') updateSaveLabel();
}
function updateEdFreehandPath(){
  if(!edDrag) return;
  const pts = edDrag.pts;
  if(!pts.length) return;
  let dstr = 'M'+pts[0][0]+' '+pts[0][1];
  for(let i=1; i<pts.length; i++) dstr += ' L'+pts[i][0]+' '+pts[i][1];
  edDrag.path.setAttribute('d', dstr);
}

function renderSubtabs(){
  const row = document.getElementById('subtab-row');
  if(!row) return;
  const pond = PROFILE_STATE.pond;
  const list = SUBTABS[pond];
  if(!list){ row.style.display='none'; row.innerHTML=''; return; }
  row.style.display='flex';
  const chips = list.map((s,i) => {
    const active = PROFILE_STATE.activeSubs.has(s.name);
    return `<span class="subtab-chip ${s.auto?'':'manual'} ${active?'on':''}" draggable="true" data-idx="${i}" ondragstart="subDragStart(event,${i})" ondragover="event.preventDefault()" ondrop="subDrop(event,${i})" ondragenter="this.classList.add('drop')" ondragleave="this.classList.remove('drop')" onclick="toggleSubtab('${s.name}')" oncontextmenu="event.preventDefault();manageSubtab('${s.name}')">${s.name} <span class="cnt">${s.count}</span></span>`;
  }).join('');
  row.innerHTML = chips + `<button class="subtab-add" onclick="addSubtab()">＋</button>`;
}
let _dragFrom = null;
function subDragStart(e, i){ _dragFrom = i; e.dataTransfer.effectAllowed='move'; }
function subDrop(e, i){
  e.preventDefault();
  document.querySelectorAll('.subtab-chip.drop').forEach(el=>el.classList.remove('drop'));
  const pond = PROFILE_STATE.pond;
  const list = SUBTABS[pond];
  if(!list || _dragFrom === null || _dragFrom === i) return;
  const [moved] = list.splice(_dragFrom, 1);
  list.splice(i, 0, moved);
  _dragFrom = null;
  renderSubtabs();
}
function toggleSubtab(name){

function manageSubtab(name){
  const pond = PROFILE_STATE.pond;
  const item = (SUBTABS[pond]||[]).find(s => s.name === name);

  document.getElementById('mng-name').textContent = name;
  document.getElementById('mng-sub').textContent = `${item.count} plops · ${item.auto?'auto-detected':'you added'}`;
  document.getElementById('mng-name-input').value = name;
  window._mngTarget = name;
  openSheet('subtab-manage');
}
function addSubtab(){
  const pond = PROFILE_STATE.pond;
  const name = prompt('New sub-tab name:');
  if(!name) return;
  (SUBTABS[pond]=SUBTABS[pond]||[]).push({name, count:0, auto:false});
  renderSubtabs();
  toast(`Added "${name}"`);
}
function renameSubtabConfirm(){
  const pond = PROFILE_STATE.pond;
  const oldName = window._mngTarget;
  const newName = document.getElementById('mng-name-input').value.trim();
  if(!newName) return;
  const item = (SUBTABS[pond]||[]).find(s => s.name === oldName);
  if(item){
    item.name = newName;
    // rename promotes auto → manual (user took ownership)
    if(item.auto && newName !== oldName){ item.auto = false; toast('Now yours to keep'); }
  }
  if(PROFILE_STATE.activeSubs.has(oldName)){
    PROFILE_STATE.activeSubs.delete(oldName);
    PROFILE_STATE.activeSubs.add(newName);
  }
  closeSheet('subtab-manage');
  renderSubtabs();
  renderMyGrid();
  toast('Renamed');
}
function deleteSubtabConfirm(){
  const pond = PROFILE_STATE.pond;
  const name = window._mngTarget;
  SUBTABS[pond] = (SUBTABS[pond]||[]).filter(s => s.name !== name);
  PROFILE_STATE.activeSubs.delete(name);
  closeSheet('subtab-manage');
  renderSubtabs();
  renderMyGrid();
  toast(`"${name}" deleted`);
}

function fsSetView(view){
  const def=document.getElementById('fs-default');

  const pills=document.getElementById('fs-pills');

  rec.style.display = view==='recents' ? 'block' : 'none';
  sug.style.display = view==='typing' ? 'block' : 'none';

  cancel.style.display = view==='default' ? 'none' : 'inline-block';

function fsRun(submit){
  const v=(document.getElementById('fs-in').value||'').trim().toLowerCase();
  const res=document.getElementById('fs-results');
  if(!v){ fsFocus(searchFocused); return; }
  const mycol=searchMyCol;
  let pool=mycol?FEED.filter(f=>f.kept||f.mine):FEED;
  const hits=pool.filter(f=>(f.t+' '+f.s).toLowerCase().includes(v));
  res.dataset.count = hits.length;
  document.getElementById('fs-grid').innerHTML=hits.map(h=>`
    <div class="res-cell" onclick="go('${h.mine?'scr-plop-mine':'scr-plop-others'}')">
      <img src="${IMG[h.img]}"><span class="rl">${h.t}</span></div>`).join('');
  if(submit){
    if(!RECENTS.includes(v)) RECENTS.unshift(v);
    document.getElementById('fs-in').blur();
    fsSetView('results');
  } else {
    // typing state: show suggestions + live results
    const sugList = [v, v+' light', v+'s'].slice(0,3);
    document.getElementById('fs-suggest-list').innerHTML = sugList.map(s=>`
      <div class="sug-item" onclick="fsPick('${s}')">
        <svg class="ric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        <span>${s}</span>
      </div>`).join('');
    fsSetView('typing');
  }
}
